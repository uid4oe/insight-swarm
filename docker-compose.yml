# ── Insight Swarm — Single-VM deployment ────────────────────────────────
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d --build
#   docker compose logs -f

services:
  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insight_swarm}
      POSTGRES_USER: ${POSTGRES_USER:-mts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mts} -d ${POSTGRES_DB:-insight_swarm}"]
      interval: 3s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mts}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  # ── Backend API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mts}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-insight_swarm}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-mts}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      API_PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      # Tuning (all optional — defaults in backend/infrastructure/env.ts)
      LLM_RATE_LIMIT_RPM: ${LLM_RATE_LIMIT_RPM:-60}
      MAX_FINDINGS_PER_ROUND: ${MAX_FINDINGS_PER_ROUND:-5}
      MAX_REACTIONS_PER_ROUND: ${MAX_REACTIONS_PER_ROUND:-8}
      MAX_TURNS_PER_ROUND: ${MAX_TURNS_PER_ROUND:-15}
      MAX_ROUNDS: ${MAX_ROUNDS:-4}
      THESIS_THRESHOLD: ${THESIS_THRESHOLD:-3}
      MAX_THESES: ${MAX_THESES:-8}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  # ── Frontend (nginx: SPA + /api reverse proxy) ──────────────────────────
  web:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
    logging: *default-logging

volumes:
  pgdata:
  rabbitmqdata:
