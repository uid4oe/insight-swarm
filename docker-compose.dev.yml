# ── Infra only — for local development ───────────────────────────────────────
# Usage: pnpm infra
#
# Starts Postgres + RabbitMQ with ports exposed to localhost.
# Run your backend/frontend natively with pnpm dev:full.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insight_swarm}
      POSTGRES_USER: ${POSTGRES_USER:-mts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mts}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mts} -d ${POSTGRES_DB:-insight_swarm}"]
      interval: 3s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  rabbitmqdata:
